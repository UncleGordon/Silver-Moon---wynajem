<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silver Moon</title>

  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'League Spartan', sans-serif; }
    body { overflow:hidden; }

    /* 🎥 VIDEO */
    .video-bg{
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      z-index:-2;
    }

    /* lekkie przyciemnienie (czytelność) */
    .shade{
      position:fixed; inset:0;
      background: rgba(0,0,0,0.15);
      z-index:-1;
    }

    /* 🔘 PRZYCISKI */
    .container{
      position:absolute;
      top:42%;
      left:50%;
      transform:translate(-50%,-50%);
      display:flex;
      flex-direction:column;
      gap:12px;
      opacity:0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: 0.8s;
    }
    @keyframes fadeIn { to { opacity:1; transform:translate(-50%,-50%); } }

    .button{
      width: 190px;
      padding: 11px 12px;
      text-align:center;
      text-decoration:none;
      border-radius: 40px;
      font-weight:600;
      font-size:15px;
      color:#fff;

      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);

      transition: all .25s ease;
      animation: pulseBrown 3s infinite;
    }
    .button:hover{
      transform: scale(1.06);
      background: rgba(255,255,255,0.20);
    }
    @keyframes pulseBrown{
      0% { box-shadow: 0 0 0 0 rgba(193,154,107,0.45); }
      70% { box-shadow: 0 0 0 14px rgba(193,154,107,0); }
      100% { box-shadow: 0 0 0 0 rgba(193,154,107,0); }
    }

    /* 🟫 BRĄZOWY PROSTOKĄT NA DOLE */
    .bottom-wrap{
      position:absolute;
      left:0; right:0;
      bottom:0;
      height: 22%;
      padding: 12px 12px 14px;
      background: rgba(120, 86, 50, 0.55);
      backdrop-filter: blur(6px);
      border-top: 2px solid rgba(255,255,255,0.85);
      display:flex;
      align-items:stretch;
    }

    /* zaokrąglona rama kafelków */
    .bottom-box{
      width:100%;
      height:100%;
      display:flex;
      border-radius: 18px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.12);
      position:relative;
    }

    /* biała linia na środku brązowego prostokąta (dzieli kafelki) */
    .divider{
      position:absolute;
      top:0;
      bottom:0;
      left:50%;
      width:2px;
      transform:translateX(-1px);
      background: rgba(255,255,255,0.9);
      z-index:4;
      pointer-events:none;
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
    }

    .tile{
      width:50%;
      height:100%;
      position:relative;
      overflow:hidden;
      cursor:pointer;
    }

    .tile iframe,
    .tile img{
      width:100%;
      height:100%;
      object-fit:cover;
      border:0;
      display:block;
    }

    .tile::after{
      content:"";
      position:absolute;
      inset:0;
      background: rgba(0,0,0,0.18);
      transition:.25s ease;
      z-index:1;
      pointer-events:none;
    }
    .tile:hover::after{ background: rgba(0,0,0,0.32); }

    .tile span{
      position:absolute;
      bottom:12px;
      left:12px;
      color:#fff;
      font-weight:600;
      font-size:14px;
      z-index:2;
      pointer-events:none;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
    }

    /* 📸 FULLSCREEN GALERIA */
    .gallery-full{
      position:fixed; inset:0;
      background:#000;
      display:none;
      justify-content:center;
      align-items:center;
      z-index:999;
      touch-action: pan-y;
    }
    .gallery-full img{ max-width:100%; max-height:100%; }

    .close{
      position:absolute;
      top:18px; right:18px;
      color:#fff;
      font-size:32px;
      cursor:pointer;
      user-select:none;
      z-index:1002;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    /* strzałki w galerii */
    .nav-arrow{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      width:46px;
      height:46px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      cursor:pointer;
      z-index:1001;
      user-select:none;
      transition: transform .15s ease, background .15s ease;
    }
    .nav-arrow:hover{
      background: rgba(255,255,255,0.18);
      transform: translateY(-50%) scale(1.06);
    }
    .nav-left{ left:16px; }
    .nav-right{ right:16px; }

    /* podpowiedź swipe */
    .hint{
      position:absolute;
      bottom:18px;
      left:50%;
      transform: translateX(-50%);
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
      color:#fff;
      font-weight:600;
      font-size:13px;
      z-index:1001;
      user-select:none;
      opacity: 0.95;
    }
  </style>
</head>

<body>

  <!-- 🎥 FILM -->
  <!-- Jeśli trzymasz video w public/ -> użyj src="/bg.mp4?v=1". Jeśli obok index.html -> "bg.mp4?v=1" -->
  <video autoplay muted loop playsinline preload="metadata" class="video-bg" poster="1.jpg">
    <source src="bg.mp4?v=1" type="video/mp4">
  </video>
  <div class="shade"></div>

  <!-- 🔘 PRZYCISKI -->
  <div class="container">
    <a class="button" href="https://wa.me/48534900140?text=Dzień%20dobry,%20w%20sprawie%20wynajmu.">WhatsApp</a>
    <a class="button" href="https://m.me/KacperNiedzielski1106">Messenger</a>
    <a class="button" href="sms:+48534900140?body=Dzień%20dobry,%20w%20sprawie%20wynajmu.">SMS</a>
  </div>

  <!-- 🟫 BRĄZOWY DÓŁ + KAFELKI -->
  <div class="bottom-wrap">
    <div class="bottom-box">
      <div class="divider"></div>

      <!-- 🗺 MAPA: Uraz, dolnośląskie -->
      <a class="tile" href="https://www.google.com/maps/search/?api=1&query=Uraz%2C%20dolno%C5%9Bl%C4%85skie" target="_blank" rel="noreferrer">
        <iframe
          src="https://maps.google.com/maps?q=Uraz%2C%20dolno%C5%9Bl%C4%85skie&z=13&output=embed"
          loading="lazy">
        </iframe>
        <span>Zobacz lokalizację</span>
      </a>

      <!-- 📸 GALERIA -->
      <div class="tile" onclick="openGallery()">
        <img src="1.jpg" alt="Galeria">
        <span>Zobacz galerię</span>
      </div>

    </div>
  </div>

  <!-- FULLSCREEN -->
  <div class="gallery-full" id="gallery" aria-hidden="true">
    <span class="close" onclick="closeGallery()">×</span>

    <div class="nav-arrow nav-left" onclick="prevImg()">‹</div>
    <div class="nav-arrow nav-right" onclick="nextImg()">›</div>

    <img id="gallery-img" alt="Zdjęcie z galerii">
    <div class="hint">Przesuń palcem ← →</div>
  </div>

  <script>
    const images = [
      "1.jpg","2.jpg","3.jpg","4.jpg","5.jpg",
      "6.jpg","7.jpg","8.jpg","9.jpg","10.jpg",
      "11.jpg","12.jpg","13.jpg","14.jpg","15.jpg"
    ];
    let index = 0;

    function showImg(){
      document.getElementById("gallery-img").src = images[index];
    }

    function openGallery(){
      const g = document.getElementById("gallery");
      g.style.display = "flex";
      g.setAttribute("aria-hidden","false");
      showImg();
    }

    function closeGallery(){
      const g = document.getElementById("gallery");
      g.style.display = "none";
      g.setAttribute("aria-hidden","true");
    }

    function nextImg(){
      index++;
      if(index >= images.length) index = 0;
      showImg();
    }

    function prevImg(){
      index--;
      if(index < 0) index = images.length - 1;
      showImg();
    }

    // swipe mobile
    let startX = 0;
    document.getElementById("gallery").addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
    }, { passive:true });

    document.getElementById("gallery").addEventListener("touchend", e => {
      const endX = e.changedTouches[0].clientX;
      if(endX < startX) nextImg();
      else prevImg();
    }, { passive:true });

    // klawiatura (desktop)
    document.addEventListener("keydown", (e) => {
      const g = document.getElementById("gallery");
      if(g.style.display !== "flex") return;

      if(e.key === "ArrowRight") nextImg();
      if(e.key === "ArrowLeft") prevImg();
      if(e.key === "Escape") closeGallery();
    });
  </script>

</body>
</html>
