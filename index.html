<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silver Moon</title>

  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'League Spartan', sans-serif; }
    body { overflow:hidden; }

    .video-bg{
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      z-index:-2;
    }

    .shade{
      position:fixed; inset:0;
      background: rgba(0,0,0,0.15);
      z-index:-1;
    }

    .container{
      position:absolute;
      top:43%;
      left:50%;
      transform:translate(-50%,-50%);
      display:flex;
      flex-direction:column;
      gap:12px;
      opacity:0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: 0.8s;
      z-index: 5;
    }
    @keyframes fadeIn { to { opacity:1; transform:translate(-50%,-50%); } }

    .button{
      width: 190px;
      padding: 11px 12px;
      text-align:center;
      text-decoration:none;
      border-radius: 40px;
      font-weight:600;
      font-size:15px;
      color:#fff;

      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);

      transition: all .25s ease;
      animation: pulseBrown 3s infinite;
      cursor: pointer;
      user-select: none;
    }
    .button:hover{
      transform: scale(1.06);
      background: rgba(255,255,255,0.20);
    }
    @keyframes pulseBrown{
      0% { box-shadow: 0 0 0 0 rgba(193,154,107,0.45); }
      70% { box-shadow: 0 0 0 14px rgba(193,154,107,0); }
      100% { box-shadow: 0 0 0 0 rgba(193,154,107,0); }
    }

    /* mini komunikat po skopiowaniu numeru */
    .toast{
      position: fixed;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .toast.show{ opacity: 1; }

    .bottom-wrap{
      position:absolute;
      left:0;
      right:0;
      bottom:7%;
      display:flex;
      justify-content:center;
      z-index: 4;
    }

    .bottom-area{
      width:92%;
      height:22vh;
      display:flex;
      gap:12px;
      padding:12px;
      border-radius:28px;
      background: rgba(120, 86, 50, 0.45);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    .mini-card{
      width:50%;
      height:100%;
      position:relative;
      overflow:hidden;
      border-radius:22px;
      cursor:pointer;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.08);
    }

    .mini-card iframe,
    .mini-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      border:0;
      display:block;
    }

    .mini-card::after{
      content:"";
      position:absolute;
      inset:0;
      background: rgba(0,0,0,0.18);
      transition:.25s ease;
      pointer-events:none;
    }
    .mini-card:hover::after{
      background: rgba(0,0,0,0.32);
    }

    .mini-card span{
      position:absolute;
      bottom:14px;
      left:16px;
      color:#fff;
      font-weight:600;
      font-size:15px;
      z-index:2;
      pointer-events:none;
      text-shadow: 0 3px 15px rgba(0,0,0,0.6);
    }

    .gallery-full{
      position:fixed; inset:0;
      background:#000;
      display:none;
      justify-content:center;
      align-items:center;
      z-index:999;
      touch-action: none; /* ✅ wyłącz gesty dotykowe w galerii */
    }
    .gallery-full img{ max-width:100%; max-height:100%; }

    .close{
      position:absolute;
      top:18px; right:18px;
      color:#fff;
      font-size:32px;
      cursor:pointer;
      user-select:none;
      z-index:1002;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    .nav-arrow{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      width:46px;
      height:46px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      cursor:pointer;
      z-index:1001;
      user-select:none;
      transition: transform .15s ease, background .15s ease;
    }
    .nav-arrow:hover{
      background: rgba(255,255,255,0.18);
      transform: translateY(-50%) scale(1.06);
    }
    .nav-left{ left:16px; }
    .nav-right{ right:16px; }
  </style>
</head>

<body>

  <!-- 🖼 TŁO -->
  <img src="tlo.jpg" class="video-bg">
  <div class="shade"></div>

  <!-- toast -->
  <div class="toast" id="toast">Skopiowano numer</div>

  <!-- 🔘 PRZYCISKI -->
  <div class="container">
  <a class="button" href="https://wa.me/48534900140?text=Dzień%20dobry,%20w%20sprawie%20wynajmu.">
    <span class="btn-content">
      <!-- WhatsApp -->
      <svg viewBox="0 0 32 32" width="18" height="18" fill="white">
        <path d="M16 .396C7.163.396 0 7.56 0 16.396c0 2.893.757 5.73 2.193 8.22L0 32l7.594-2.165A15.94 15.94 0 0 0 16 32c8.837 0 16-7.163 16-16.004C32 7.56 24.837.396 16 .396zm0 29.209c-2.6 0-5.143-.7-7.375-2.022l-.527-.313-4.507 1.284 1.205-4.395-.343-.553A13.48 13.48 0 0 1 2.52 16.396C2.52 8.943 8.547 2.917 16 2.917s13.48 6.026 13.48 13.48c0 7.453-6.027 13.48-13.48 13.48zm7.523-10.113c-.412-.206-2.438-1.202-2.815-1.338-.377-.137-.652-.206-.927.206-.274.412-1.064 1.338-1.304 1.613-.24.274-.48.309-.892.103-.412-.206-1.741-.641-3.317-2.046-1.227-1.094-2.055-2.444-2.295-2.856-.24-.412-.025-.634.181-.839.186-.185.412-.48.618-.72.206-.24.274-.412.412-.686.137-.274.069-.515-.034-.72-.103-.206-.927-2.238-1.27-3.065-.334-.803-.674-.694-.927-.707l-.792-.014c-.274 0-.72.103-1.098.515-.377.412-1.44 1.407-1.44 3.428 0 2.021 1.476 3.976 1.681 4.252.206.274 2.904 4.436 7.036 6.216.983.424 1.75.678 2.348.868.986.314 1.883.27 2.593.164.791-.118 2.438-.995 2.783-1.957.343-.961.343-1.785.24-1.957-.103-.172-.377-.274-.789-.48z"/>
      </svg>
      WhatsApp
    </span>
  </a>

  <a class="button" href="https://m.me/KacperNiedzielski1106">
    <span class="btn-content">
      <!-- Messenger -->
      <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
        <path d="M12 2C6.48 2 2 6.02 2 11c0 2.7 1.39 5.12 3.6 6.76V22l3.2-1.76c1 .28 2.07.43 3.2.43 5.52 0 10-4.02 10-9S17.52 2 12 2zm1.1 12.6l-2.6-2.8-4.8 2.8 5.3-5.6 2.6 2.8 4.8-2.8-5.3 5.6z"/>
      </svg>
      Messenger
    </span>
  </a>

  <div class="button" id="copyBtn">
    <span class="btn-content">
      <!-- Telefon -->
      <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
        <path d="M6.62 10.79a15.466 15.466 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.07 21 3 13.93 3 5c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
      </svg>
      Kopiuj numer
    </span>
  </div>
</div>
  <!-- 🟫 DÓŁ -->
  <div class="bottom-wrap">
    <div class="bottom-area">

      <a class="mini-card" href="https://www.google.com/maps/search/?api=1&query=Uraz%2C%20dolno%C5%9Bl%C4%85skie" target="_blank" rel="noreferrer">
        <iframe
          src="https://maps.google.com/maps?q=Uraz%2C%20dolno%C5%9Bl%C4%85skie&z=13&output=embed"
          loading="lazy"></iframe>
        <span>Zobacz lokalizację</span>
      </a>

      <div class="mini-card" onclick="openGallery()">
        <img src="1.jpg" alt="Galeria">
        <span>Zobacz galerię</span>
      </div>

    </div>
  </div>

  <!-- GALERIA -->
  <div class="gallery-full" id="gallery" aria-hidden="true">
    <span class="close" onclick="closeGallery()">×</span>
    <div class="nav-arrow nav-left" onclick="prevImg()">‹</div>
    <div class="nav-arrow nav-right" onclick="nextImg()">›</div>
    <img id="gallery-img" alt="Zdjęcie z galerii">
  </div>

  <script>
    const PHONE = "+48 534 900 140";
    const PHONE_RAW = "+48534900140";

    // ✅ kopiowanie numeru (działa nawet w TikToku)
    const toast = document.getElementById("toast");
    document.getElementById("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(PHONE_RAW);
        toast.textContent = "Skopiowano: " + PHONE;
      } catch (e) {
        // jeśli clipboard zablokowany, pokaż numer do skopiowania ręcznie
        toast.textContent = "Numer: " + PHONE;
      }
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    });

    const images = [
      "1.jpg","2.jpg","3.jpg","4.jpg","5.jpg",
      "6.jpg","7.jpg","8.jpg","9.jpg","10.jpg",
      "11.jpg","12.jpg","13.jpg","14.jpg","15.jpg"
    ];
    let index = 0;

    function showImg(){
      document.getElementById("gallery-img").src = images[index];
    }
    function openGallery(){
      const g = document.getElementById("gallery");
      g.style.display = "flex";
      g.setAttribute("aria-hidden","false");
      showImg();
    }
    function closeGallery(){
      const g = document.getElementById("gallery");
      g.style.display = "none";
      g.setAttribute("aria-hidden","true");
    }
    function nextImg(){
      index = (index + 1) % images.length;
      showImg();
    }
    function prevImg(){
      index = (index - 1 + images.length) % images.length;
      showImg();
    }

    // klawiatura (desktop)
    document.addEventListener("keydown", (e) => {
      const g = document.getElementById("gallery");
      if(g.style.display !== "flex") return;
      if(e.key === "ArrowRight") nextImg();
      if(e.key === "ArrowLeft") prevImg();
      if(e.key === "Escape") closeGallery();
    });
  </script>

</body>
</html>
